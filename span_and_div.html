<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- GROUP TOGETHER HTML -->
    <!-- <span> inline container to group elements for styling purposes -->
    <!-- <div> block container to group elements for styling purposes -->

    <h1><span style="background-color: rgb(0, 234, 255);">This is a span title</span></h1>
    <h1><div style="background-color: tomato;">This is a div title</div></h1>
    
</body>
</html>
