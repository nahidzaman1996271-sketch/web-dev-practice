<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Galaxy Playground</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #05050a;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 16px;
  }
  .canvas-wrap {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #05050a;
    border: 1px solid rgba(255,255,255,0.08);
  }
  canvas {
    width: 100%;
    height: 480px;
    display: block;
    cursor: crosshair;
  }
  .hint {
    position: absolute;
    top: 12px;
    left: 16px;
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    pointer-events: none;
  }
  .clear-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 11px;
    padding: 5px 10px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    cursor: pointer;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.15); }

  .theme-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0 12px;
  }
  button {
    font-size: 13px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.85);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: rgba(255,255,255,0.12); }
  button:active { transform: scale(0.98); }
  .theme-btn { flex: 1; min-width: 100px; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
    margin-bottom: 10px;
  }
  @media (max-width: 560px) {
    .controls { grid-template-columns: 1fr; }
  }
  .control-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #7f77dd;
  }
  .rainbow-row {
    display: flex;
    align-items: flex-end;
  }
  .rainbow-row button { width: 100%; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Particle galaxy playground</h1>

  <div class="canvas-wrap">
    <canvas id="galaxy"></canvas>
    <div class="hint">drag to place gravity wells &middot; double-click for supernova</div>
    <button class="clear-btn" id="clearWells">clear wells</button>
  </div>

  <div class="theme-row">
    <button class="theme-btn" data-theme="nebula">Nebula</button>
    <button class="theme-btn" data-theme="inferno">Inferno</button>
    <button class="theme-btn" data-theme="ocean">Ocean</button>
    <button class="theme-btn" data-theme="mono">Monochrome</button>
  </div>

  <div class="controls">
    <div>
      <div class="control-label"><span>Star count</span><span id="countOut">900</span></div>
      <input type="range" id="countSlider" min="200" max="2200" step="50" value="900" />
    </div>
    <div>
      <div class="control-label"><span>Trail length</span><span id="trailOut">medium</span></div>
      <input type="range" id="trailSlider" min="4" max="40" step="1" value="16" />
    </div>
    <div>
      <div class="control-label"><span>Swirl speed</span><span id="swirlOut">1.0x</span></div>
      <input type="range" id="swirlSlider" min="0" max="30" step="1" value="10" />
    </div>
    <div class="rainbow-row">
      <button id="rainbowToggle">Rainbow pulse: off</button>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('galaxy');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.clientWidth; H = canvas.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const THEMES = {
    nebula: [265, 190, 340, 20, 165],
    inferno: [10, 30, 45, 355, 15],
    ocean: [185, 200, 170, 220, 195],
    mono: [0, 0, 0, 0, 0]
  };
  let hues = THEMES.nebula;
  let monoMode = false;
  let rainbowPulse = false;
  let hueShift = 0;

  function rand(a, b) { return a + Math.random() * (b - a); }

  let particles = [];
  function makeParticles(n) {
    particles = [];
    for (let i = 0; i < n; i++) {
      const angle = rand(0, Math.PI * 2);
      const radius = rand(20, Math.min(W, H) * 0.42);
      particles.push({
        x: W / 2 + Math.cos(angle) * radius,
        y: H / 2 + Math.sin(angle) * radius,
        vx: rand(-0.15, 0.15),
        vy: rand(-0.15, 0.15),
        hue: hues[i % hues.length] + rand(-15, 15),
        size: rand(0.6, 2.2)
      });
    }
  }
  makeParticles(900);

  let mouse = { x: W / 2, y: H / 2, active: false, down: false };
  let wells = [];

  canvas.addEventListener('mousemove', (e) => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; mouse.down = false; });
  canvas.addEventListener('mousedown', (e) => {
    mouse.down = true;
    const r = canvas.getBoundingClientRect();
    wells.push({ x: e.clientX - r.left, y: e.clientY - r.top, strength: 1 });
    if (wells.length > 6) wells.shift();
  });
  window.addEventListener('mouseup', () => { mouse.down = false; });
  canvas.addEventListener('touchstart', (e) => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    wells.push({ x: t.clientX - r.left, y: t.clientY - r.top, strength: 1 });
    if (wells.length > 6) wells.shift();
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    mouse.x = t.clientX - r.left; mouse.y = t.clientY - r.top; mouse.active = true;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { mouse.active = false; });

  document.getElementById('clearWells').addEventListener('click', () => { wells = []; });

  let burst = 0;
  canvas.addEventListener('dblclick', () => { burst = 30; });

  let swirlMult = 1.0;
  const swirlSlider = document.getElementById('swirlSlider');
  const swirlOut = document.getElementById('swirlOut');
  swirlSlider.addEventListener('input', () => {
    swirlMult = swirlSlider.value / 10;
    swirlOut.textContent = swirlMult.toFixed(1) + 'x';
  });

  let trailAlpha = 0.16;
  const trailSlider = document.getElementById('trailSlider');
  const trailOut = document.getElementById('trailOut');
  trailSlider.addEventListener('input', () => {
    const v = Number(trailSlider.value);
    trailAlpha = 0.42 - (v / 40) * 0.36;
    trailOut.textContent = v < 12 ? 'long' : v < 26 ? 'medium' : 'short';
  });

  const countSlider = document.getElementById('countSlider');
  const countOut = document.getElementById('countOut');
  countSlider.addEventListener('input', () => {
    countOut.textContent = countSlider.value;
    makeParticles(Number(countSlider.value));
  });

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const theme = btn.dataset.theme;
      monoMode = theme === 'mono';
      hues = THEMES[theme];
      particles.forEach((p, i) => { p.hue = hues[i % hues.length] + rand(-15, 15); });
    });
  });

  const rainbowBtn = document.getElementById('rainbowToggle');
  rainbowBtn.addEventListener('click', () => {
    rainbowPulse = !rainbowPulse;
    rainbowBtn.textContent = 'Rainbow pulse: ' + (rainbowPulse ? 'on' : 'off');
  });

  function frame() {
    ctx.fillStyle = `rgba(5,5,10,${trailAlpha})`;
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;
    if (rainbowPulse) hueShift += 0.6;

    wells = wells.filter(w => (w.strength -= 0.004) > 0);

    for (const p of particles) {
      let ax = 0, ay = 0;

      const dxc = cx - p.x, dyc = cy - p.y;
      const distC = Math.sqrt(dxc * dxc + dyc * dyc) + 0.001;
      ax += (dxc / distC) * 0.012;
      ay += (dyc / distC) * 0.012;
      ax += (-dyc / distC) * 0.02 * swirlMult;
      ay += (dxc / distC) * 0.02 * swirlMult;

      if (mouse.active) {
        const dx = mouse.x - p.x, dy = mouse.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
        const force = Math.min(1.1 / dist, 0.35);
        ax += (dx / dist) * force;
        ay += (dy / dist) * force;
      }

      for (const w of wells) {
        const dx = w.x - p.x, dy = w.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
        const force = Math.min((3.2 * w.strength) / dist, 1.1);
        ax += (dx / dist) * force;
        ay += (dy / dist) * force;
      }

      if (burst > 0) {
        const dx = p.x - cx, dy = p.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
        ax += (dx / dist) * 1.7;
        ay += (dy / dist) * 1.7;
      }

      p.vx = (p.vx + ax) * 0.965;
      p.vy = (p.vy + ay) * 0.965;
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) p.x += W; if (p.x > W) p.x -= W;
      if (p.y < 0) p.y += H; if (p.y > H) p.y -= H;

      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      const glow = Math.min(1, 0.35 + speed * 1.8);

      let color;
      if (monoMode) {
        const b = 70 + glow * 25;
        color = `hsla(0, 0%, ${b}%, ${0.55 + glow * 0.4})`;
      } else {
        const h = rainbowPulse ? (p.hue + hueShift) % 360 : p.hue;
        color = `hsla(${h}, 85%, ${55 + glow * 20}%, ${0.55 + glow * 0.4})`;
      }

      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.arc(p.x, p.y, p.size + speed * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    for (const w of wells) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(255,255,255,${0.25 * w.strength})`;
      ctx.lineWidth = 1;
      ctx.arc(w.x, w.y, 10 + (1 - w.strength) * 30, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (burst > 0) burst--;
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
