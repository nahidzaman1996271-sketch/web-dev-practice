<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>This is a paragraph</p>
    <b>This text is bold</b><br>
    <i>This text is italic</i><br>
    <u>This text is underlined</u><br>
    <s>This text is strikethrough</s><br>
    <mark>This text is highlighted</mark><br>
    <sub>This is subscript</sub><br>
    <sup>This is superscript</sup><br>
    <small>This text is small</small><br>
    <big>This text is big</big><br>
    <strong>This text is important (bold)</strong><br>
    <em>This text is emphasized (italic)</em><br>
</body>
</html>
